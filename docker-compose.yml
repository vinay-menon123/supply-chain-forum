services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum
      POSTGRES_DB: forum
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum -d forum"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    image: forum-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://forum:forum@db:5432/forum
      JWT_SECRET: change-me-in-production
      # OAuth 2.0 Web Client ID from Google Cloud Console; set it in a .env
      # file next to this compose file: GOOGLE_CLIENT_ID=xxxx.apps.googleusercontent.com
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PORT: "4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    image: forum-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db-data:
  uploads:
