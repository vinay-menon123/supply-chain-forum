services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum
      POSTGRES_DB: forum
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum -d forum"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    image: forum-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://forum:forum@db:5432/forum
      JWT_SECRET: change-me-in-production
      # OAuth 2.0 Web Client ID from Google Cloud Console; set it in a .env
      # file next to this compose file: GOOGLE_CLIENT_ID=xxxx.apps.googleusercontent.com
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Comma-separated emails that get the ADMIN role on sign-in
      ADMIN_EMAILS: ${ADMIN_EMAILS:-vinay.menon2707@gmail.com}
      # Optional: AI content moderation via the Claude API (wordlist-only when unset)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      # Optional: weekly digest emails (disabled when SMTP_HOST unset)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@cscen.local}
      # Preferred email backend: Resend HTTP API (works where SMTP ports are blocked, e.g. Railway).
      # MAIL_FROM must be a Resend-verified sender (or onboarding@resend.dev while testing).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      # Local dev only: return un-sent OTPs in the API response for testing. NEVER set on prod.
      EXPOSE_DEV_OTP: ${EXPOSE_DEV_OTP:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_MODEL: ${GEMINI_API_MODEL:-gemini-2.5-flash}
      NEWS_SYNC_CRON: ${NEWS_SYNC_CRON:-0 30 23 * * *}
      APP_URL: ${APP_URL:-http://localhost:3000}
      PORT: "4000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    image: forum-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db-data:
  uploads:
