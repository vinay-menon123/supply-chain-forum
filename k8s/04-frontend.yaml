apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: forum
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Bump this tag on each release (mutable :latest gets stale on the nodes)
          image: forum-frontend:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: forum
spec:
  # Docker Desktop exposes LoadBalancer services on localhost
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 8080
      targetPort: 80
