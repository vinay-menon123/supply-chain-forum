apiVersion: v1
kind: Secret
metadata:
  name: forum-secrets
  namespace: forum
type: Opaque
stringData:
  POSTGRES_PASSWORD: forum
  JWT_SECRET: change-me-in-production
  DATABASE_URL: postgresql://forum:forum@db:5432/forum
  # Paste your OAuth 2.0 Web Client ID (xxxx.apps.googleusercontent.com)
  GOOGLE_CLIENT_ID: ""
  # Comma-separated emails that get the ADMIN role on sign-in
  ADMIN_EMAILS: vinay.menon2707@gmail.com
  # Optional: AI moderation (empty = wordlist only)
  ANTHROPIC_API_KEY: ""
  # Optional: weekly digest emails (empty SMTP_HOST = disabled)
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASS: ""
